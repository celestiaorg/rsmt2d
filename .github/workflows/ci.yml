name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - release/**

env:
  GO_VERSION: '1.25'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        goarch: ["amd64"]
    timeout-minutes: 5
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/checkout@v6
      - uses: technote-space/get-diff-action@f27caffdd0fb9b13f4fc191c016bb4e0632844af # v6
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
      - name: build
        run: GOOS=linux GOARCH=${{ matrix.goarch }} go build
        if: env.GIT_DIFF
      - name: test & coverage report creation
        run: |
          GOARCH=${{ matrix.goarch }} go test ./... -mod=readonly -timeout 8m -race -coverprofile=coverage.txt -covermode=atomic
        if: env.GIT_DIFF
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          file: ./coverage.txt
        if: env.GIT_DIFF
